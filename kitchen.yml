---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  install_strategy: once
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  chef_license: accept

verifier:
  name: inspec

x-run_lists:
  default: &default_run_list
    - recipe[test::default]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

platforms:
  - name: debian-12
  - name: ubuntu-24.04

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
